{{define "title"}}Бронирование - SUP Anapa{{end}}

{{define "content"}}
<div class="max-w-4xl mx-auto">
    <h1 class="text-4xl font-bold text-gray-800 mb-8">Забронировать прогулку</h1>

    <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
        <h2 class="text-2xl font-semibold mb-4">Выберите дату и время</h2>
        <div id="slots-container" class="space-y-4">
            <!-- Slots will be loaded here -->
        </div>
    </div>

    <div id="booking-form-container" class="hidden">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h2 class="text-2xl font-semibold mb-4">Детали бронирования</h2>
            
            <div id="weather-info" class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
                <!-- Weather info will be loaded here -->
            </div>

            <form id="booking-form" class="space-y-4">
                <input type="hidden" name="slot_id" id="selected-slot-id">
                
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Ваше имя</label>
                    <input type="text" name="client_name" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Телефон</label>
                    <input type="tel" name="client_phone" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Email (необязательно)</label>
                    <input type="email" name="client_email" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Количество человек</label>
                    <input type="number" name="people_count" value="1" min="1" id="people-count" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>

                <button type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200">
                    Забронировать
                </button>
            </form>

            <div id="booking-result" class="mt-4"></div>
        </div>
    </div>
</div>

<script>
    // Загрузить доступные слоты
    fetch('/admin/api/slots')
        .then(res => res.json())
        .then(slots => {
            const container = document.getElementById('slots-container');
            if (slots.length === 0) {
                container.innerHTML = '<p class="text-gray-500">Нет доступных слотов для бронирования</p>';
                return;
            }
            
            // Группировать слоты по датам
            const slotsByDate = {};
            slots.forEach(slot => {
                const date = new Date(slot.Date).toLocaleDateString('ru-RU');
                if (!slotsByDate[date]) {
                    slotsByDate[date] = [];
                }
                slotsByDate[date].push(slot);
            });
            
            // Отобразить слоты
            let html = '';
            Object.keys(slotsByDate).sort().forEach(date => {
                html += `<div class="mb-4">
                    <h3 class="text-lg font-semibold mb-2">${date}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">`;
                
                slotsByDate[date].forEach(slot => {
                    html += `
                        <div class="border border-gray-300 rounded-lg p-4 hover:border-blue-500 cursor-pointer transition"
                             onclick="selectSlot(${slot.ID}, '${date}', '${slot.StartTime} - ${slot.EndTime}', ${slot.Price}, 'Инструктор #${slot.InstructorID}', ${slot.MaxPeople})">
                            <div class="flex justify-between items-center">
                                <div>
                                    <p class="font-semibold">${slot.StartTime.substring(0,5)} - ${slot.EndTime.substring(0,5)}</p>
                                    <p class="text-sm text-gray-600">До ${slot.MaxPeople} человек</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-lg font-bold text-blue-600">${slot.Price} ₽</p>
                                </div>
                            </div>
                        </div>`;
                });
                
                html += `</div></div>`;
            });
            
            container.innerHTML = html;
        });

    function selectSlot(slotId, date, time, price, instructor, maxPeople) {
        document.getElementById('selected-slot-id').value = slotId;
        document.getElementById('people-count').max = maxPeople;
        document.getElementById('booking-form-container').classList.remove('hidden');
        
        // Показать информацию о слоте
        document.getElementById('weather-info').innerHTML = `
            <h3 class="font-semibold mb-2">Детали бронирования</h3>
            <div class="space-y-2">
                <p class="text-gray-600">Дата: <span class="font-semibold">${date}</span></p>
                <p class="text-gray-600">Время: <span class="font-semibold">${time}</span></p>
                <p class="text-gray-600">Инструктор: <span class="font-semibold">${instructor}</span></p>
                <p class="text-gray-600">Цена: <span class="font-semibold text-blue-600">${price} ₽</span></p>
                <p class="text-gray-600">Максимум человек: <span class="font-semibold">${maxPeople}</span></p>
            </div>
        `;
        
        // Scroll to form
        document.getElementById('booking-form-container').scrollIntoView({ behavior: 'smooth' });
    }
    
    // Обработка отправки формы
    document.getElementById('booking-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        const data = {
            slot_id: parseInt(formData.get('slot_id')),
            client_name: formData.get('client_name'),
            client_phone: formData.get('client_phone'),
            client_email: formData.get('client_email'),
            people_count: parseInt(formData.get('people_count'))
        };
        
        fetch('/booking', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(result => {
            const resultDiv = document.getElementById('booking-result');
            resultDiv.innerHTML = `
                <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded">
                    <p class="font-semibold">Бронирование успешно создано!</p>
                    <p class="text-sm">Номер бронирования: #${result.ID}</p>
                    <p class="text-sm">Мы свяжемся с вами в ближайшее время для подтверждения.</p>
                </div>
            `;
            this.reset();
            document.getElementById('booking-form-container').classList.add('hidden');
        })
        .catch(err => {
            const resultDiv = document.getElementById('booking-result');
            resultDiv.innerHTML = `
                <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
                    <p class="font-semibold">Ошибка при создании бронирования</p>
                    <p class="text-sm">Пожалуйста, попробуйте еще раз или свяжитесь с нами по телефону.</p>
                </div>
            `;
        });
    });
</script>
{{end}}
