{{define "title"}}Наши инструкторы - SUP Anapa{{end}}

{{define "content"}}
<div class="max-w-6xl mx-auto">
    <h1 class="text-4xl font-bold text-gray-800 mb-4 text-center">Наши инструкторы</h1>
    <p class="text-xl text-gray-600 mb-12 text-center">Профессиональная команда с многолетним опытом</p>

    <div id="instructors-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Инструкторы будут загружены здесь -->
    </div>
</div>

<script>
    // Загрузить список инструкторов
    fetch('/admin/api/instructors')
        .then(res => res.json())
        .then(instructors => {
            const grid = document.getElementById('instructors-grid');
            if (instructors.length === 0) {
                grid.innerHTML = '<p class="text-gray-500 text-center col-span-full">Инструкторы скоро появятся</p>';
                return;
            }
            
            let html = '';
            instructors.forEach(instructor => {
                const photoURL = instructor.Photo || 'https://via.placeholder.com/400x400?text=Instructor';
                html += `
                    <div class="bg-white rounded-lg shadow-lg overflow-hidden hover:shadow-xl transition">
                        <img src="${photoURL}" alt="${instructor.Name}" class="w-full h-64 object-cover" onerror="this.src='https://via.placeholder.com/400x400?text=Instructor'">
                        <div class="p-6">
                            <h3 class="text-2xl font-bold text-gray-800 mb-2">${instructor.Name}</h3>
                            <p class="text-gray-600 mb-3">${instructor.Phone}</p>
                            <p class="text-gray-700">${instructor.Description || 'Опытный инструктор SUP'}</p>
                        </div>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        });
</script>
{{end}}
