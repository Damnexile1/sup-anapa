{{define "title"}}Вход - SUP Anapa{{end}}

{{define "content"}}
<div class="max-w-md mx-auto bg-white rounded-lg shadow p-6">
    <h1 class="text-2xl font-bold mb-4">Вход пользователя</h1>
    <form method="post" action="/user/login" class="space-y-4">
        <div><label class="block mb-1">Логин</label><input name="username" required class="w-full border rounded px-3 py-2"></div>
        <div><label class="block mb-1">Пароль</label><input type="password" name="password" required class="w-full border rounded px-3 py-2"></div>
        <button class="w-full bg-blue-600 text-white rounded py-2">Войти</button>
    </form>
</div>
{{end}}
